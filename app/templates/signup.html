{% extends "base.html" %}

{% block title %}Sign Up - NutriTracker{% endblock %}

{% block content %}
<section style="display: flex; justify-content: center; align-items: center; min-height: 60vh; margin-top: 2rem;">
    <form method="POST" style="max-width: 400px; width: 100%;">
        <h2 style="text-align: center; color: var(--color-dark); margin-bottom: 1.5rem;">📝 Create Your Account</h2>
        
        {% if error %}
            <div class="alert alert-error">{{ error }}</div>
        {% endif %}
        
        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" required placeholder="Choose a username">
        </div>
        
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required placeholder="Enter your email">
        </div>
        
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required placeholder="Create a password">
        </div>
        
        <div class="form-group">
            <label for="confirm_password">Confirm Password</label>
            <input type="password" id="confirm_password" name="confirm_password" required placeholder="Confirm your password">
        </div>
        
        <button type="submit" class="btn btn-primary" style="width: 100%; cursor: pointer;">
            📝 Create Account
        </button>
        
        <div style="text-align: center; margin-top: 1.5rem;">
            <p>Already have an account? <a href="{{ url_for('auth.login') }}" style="color: var(--color-broccoli); font-weight: bold;">Login here 🔓</a></p>
        </div>
    </form>
</section>
{% endblock %}
